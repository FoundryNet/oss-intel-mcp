name: "@foundrynet/oss-intel-mcp"
displayName: "FoundryNet Open Source Intelligence"
description: >-
  GitHub project health scoring, dependency vulnerability risk, license compatibility checking, and package comparison across npm, PyPI, and Cargo.
icon: "💻"
homepage: "https://foundrynet.io"
repository: "https://github.com/FoundryNet/oss-intel-mcp"
license: "MIT"
categories:
  - development
  - security
  - data
tags:
  - open-source
  - github
  - dependency-risk
  - package-health
  - vulnerability-check
  - license-check
  - npm
  - pypi
keywords:
  - open-source
  - github
  - dependency-risk
  - package-health
  - vulnerability-check
  - license-check
  - npm
  - pypi
attestation:
  protocol: "MINT Protocol"
  verified_outputs: true
  live_feed: "https://mint.foundrynet.io/feed"
network:
  name: "FoundryNet Data Network"
  servers: 17
startCommand:
  type: http
  url: "https://oss-intel-mcp-production.up.railway.app/mcp"
  transport: streamable-http
  configSchema:
    type: object
    properties:
      api_key:
        type: string
        title: "Forge billing key (optional)"
        description: "fnet_ key to bypass the per-query x402 paywall and bill to a Forge account."
